<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OPS INTEL Pilot Briefing</title>
  <style>
    :root{color-scheme:dark;--bg:#08131f;--soft:#102235;--card:#14283b;--card2:#0f2031;--line:#29485f;--text:#f3f8fb;--muted:#a9bdc9;--accent:#9bd8f2;--ok:#9ee6ae;--warn:#f6d77b;--bad:#f2a39b;--shadow:0 16px 36px rgba(0,0,0,.24);--r:8px;--fs:15pt}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 0%,rgba(155,216,242,.18),transparent 34%),linear-gradient(180deg,var(--soft),var(--bg) 52%,#050d17);color:var(--text);font-family:"Segoe UI",Arial,sans-serif;font-size:var(--fs)}button,input{font:inherit}button{cursor:pointer}.shell{width:min(430px,100%);min-height:100vh;margin:0 auto;padding:12px 10px 20px}.top{display:flex;align-items:center;justify-content:space-between;min-height:40px;margin-bottom:10px}.top strong{position:relative;padding-left:24px;font-size:14pt}.top strong:before{content:"OPS";position:absolute;left:0;top:2px;color:var(--accent);font-size:9pt}.card,.search,.settings{width:100%;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,var(--card),var(--card2));box-shadow:var(--shadow);padding:12px;margin-bottom:12px}.search{display:grid;gap:8px}.row{display:grid;grid-template-columns:minmax(0,1fr) 86px;gap:8px}input,button{min-height:44px;border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.06);color:var(--text);padding:0 12px}button{background:color-mix(in srgb,var(--accent) 28%,var(--card));font-weight:700}label,.muted,.wx pre,.event p,.event li{color:var(--muted)}label{font-size:12pt;text-transform:uppercase}.hidden{display:none!important}.risk{border-radius:6px;padding:5px 8px;background:color-mix(in srgb,var(--ok) 38%,transparent);color:var(--ok);font-size:11pt;font-weight:800}.risk.medium{background:color-mix(in srgb,var(--warn) 36%,transparent);color:var(--warn)}.risk.high,.risk.critical{background:color-mix(in srgb,var(--bad) 34%,transparent);color:var(--bad)}.head{display:flex;justify-content:space-between;gap:10px}.head h1,.head h2{margin:0;font-size:17pt}.chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.chips span{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);padding:5px 8px;color:var(--muted);font-size:11pt}.wx,.mini{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.05);padding:10px;margin-top:8px}.wx strong,.mini strong{display:block;color:var(--ok);font-size:13pt}.wx pre{white-space:pre-wrap;overflow-wrap:anywhere;margin:6px 0 0;font:12pt/1.45 "Segoe UI","Roboto Mono",Consolas,monospace}.threats{padding:0;overflow:hidden}.threats>h2{margin:0;padding:12px 12px 6px;font-size:15pt}.threat{border-top:1px solid var(--line);padding:10px 12px}.threat h3{display:flex;gap:8px;margin:0;color:var(--text);font-size:13pt}.rank{color:var(--warn);font-weight:800}.event{border-top:1px solid var(--line);margin-top:8px;padding-top:8px}.event summary{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;cursor:pointer}.event em{display:block;color:var(--muted);font-style:normal;font-size:11pt}.event h4{margin:10px 0;color:var(--text);font-size:15pt}.settingsOverlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:18px;background:rgba(2,8,14,.68);backdrop-filter:blur(8px)}.settings{max-height:min(640px,calc(100vh - 36px));overflow:auto;margin:0}.panelHead,.settingLine,.stationItem{display:flex;align-items:center;justify-content:space-between;gap:10px}.settingLine,.stationItem{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.05);padding:10px;margin:10px 0}.switch{display:inline-flex;align-items:center;gap:8px}.switch input{position:absolute;opacity:0}.track{position:relative;width:48px;height:26px;border:1px solid var(--line);border-radius:999px;background:#6f8394}.thumb{position:absolute;left:3px;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .16s}.switch input:checked+.track{background:var(--accent)}.switch input:checked+.track .thumb{transform:translateX(21px)}body.light{color-scheme:light;--bg:#f7fbfc;--soft:#eef8fb;--card:#fff;--card2:#f5fbfd;--line:#cfe3ec;--text:#20313a;--muted:#5b7380;--accent:#8ecae6;--ok:#3e9b61;--warn:#c79a2b;--bad:#d77c73;--shadow:0 14px 30px rgba(116,150,160,.18)}@media(max-width:360px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><strong>OPS INTEL</strong><button id="settingsBtn" aria-label="Settings">&#9881;</button></header>
    <section id="settings" class="settingsOverlay hidden" role="dialog" aria-modal="true">
      <div class="settings">
        <div class="panelHead"><h2>Settings</h2><button id="closeSettings">&times;</button></div>
        <div class="settingLine"><span>Theme</span><label class="switch"><input id="themeToggle" type="checkbox"><span class="track"><span class="thumb"></span></span><b id="themeLabel">Dark</b></label></div>
        <div class="settingLine"><span>Event Database</span><b id="eventCount">Loading...</b></div>
        <form id="stationForm"><label for="stationInput">Base Station</label><div class="row"><input id="stationInput" placeholder="RKSI" maxlength="4"><button id="stationSave">Add</button></div></form>
        <div id="stationList"></div>
      </div>
    </section>
    <section class="search"><label for="flightInput">Flight</label><div class="row"><input id="flightInput" value="KE629"><button id="searchBtn">Search</button></div><p id="status" class="muted"></p></section>
    <section id="baseWx"></section>
    <section id="briefing" class="hidden"></section>
  </main>
  <script>
    const DATA = {};
    const $ = id => document.getElementById(id);
    const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const norm = v => String(v||"").trim().toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,4);
    const read = (k,d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d } catch { return d } };
    const stations = () => { const s = read("opsIntelBaseStations", ["RKSI"]).map(norm).filter(x=>x.length===4); return s.length?s:["RKSI"] };
    const saveStations = s => localStorage.setItem("opsIntelBaseStations", JSON.stringify([...new Set(s.map(norm).filter(x=>x.length===4))]));
    const severity = v => (v||0)>=5?"Critical":(v||0)>=4?"High":(v||0)>=3?"Medium":"Low";
    const riskLevel = tags => tags.includes("WINDSHEAR")||["TSRA","CB","LOW_VISIBILITY","HEAVY_RAIN"].filter(x=>tags.includes(x)).length>=2?"HIGH":tags.some(x=>["TSRA","CB","LOW_VISIBILITY","HEAVY_RAIN","WET_RWY","GUST","TAILWIND","CROSSWIND","FOG"].includes(x))?"MEDIUM":"LOW";
    const weatherTags = text => { const t=(text||"").toUpperCase(), tags=[]; [["WINDSHEAR","WS"],["TSRA","TSRA"],["CB","CB"],["HEAVY_RAIN","+RA"],["WET_RWY","RA"],["GUST","G"],["FOG","FG"],["LOW_VISIBILITY"," 3000"],["CROSSWIND","KT"]].forEach(([a,b])=>{if(t.includes(b))tags.push(a)}); return [...new Set(tags)] };
    const threatTitle = tags => tags.includes("WET_RWY")?["Wet Runway Landing Performance","Wet runway and convective weather may reduce landing performance margin."]:tags.some(x=>["CONVECTIVE_WEATHER","TSRA","CB"].includes(x))?["Convective Weather Near Final Approach","Thunderstorm cells near final can rapidly reduce path, speed, and wind margin."]:tags.includes("UNSTABLE_APPROACH_RISK")?["Unstable Approach and Late Go-Around","High workload conditions increase continuation bias below stable approach gates."]:tags.includes("GPS_INTEGRITY")?["RNAV and GPS Integrity","Navigation integrity changes require a briefed backup approach and early reconfiguration."]:tags.includes("ETOPS")?["Long-Haul Diversion and System Margin","Long-haul sectors need early fuel, system, and alternate decision gates."]:["Route-Based Operational Threat","Similar route events suggest a targeted prevention review."];
    async function loadData(){ for (const name of ["routes","events","ops_intel","weather","status"]) DATA[name]=await fetch(`data/${name}.json`).then(r=>r.json()) }
    function applyTheme(v){ const light=v==="light"; document.body.classList.toggle("light",light); $("themeToggle").checked=light; $("themeLabel").textContent=light?"Light":"Dark"; localStorage.setItem("opsIntelTheme",light?"light":"dark") }
    function renderStations(){ $("stationList").innerHTML=stations().map(s=>`<div class="stationItem"><b>${s}</b><button data-edit="${s}">Edit</button><button data-del="${s}">Delete</button></div>`).join(""); document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{$("stationInput").value=b.dataset.edit;$("stationSave").textContent="Save"}); document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{saveStations(stations().filter(s=>s!==b.dataset.del));renderStations();renderBaseWx()}) }
    function renderBaseWx(){ $("baseWx").innerHTML=`<article class="card"><div class="head"><h2>Base Station WX</h2></div>${stations().map(s=>{const wx=DATA.weather.stations[s]||{};return `<div class="wx"><strong>${s}</strong><pre>${esc(wx.metar||"METAR unavailable")}</pre><pre>${esc(wx.taf||"TAF unavailable")}</pre></div>`}).join("")}</article>` }
    function score(event, ctx, tags){ let s=0, et=event.tags||[]; if(event.airport_icao===ctx.arrival_icao)s+=25; if(event.runway&&event.runway===ctx.destination_runway)s+=15; if(tags.length)s+=Math.min(25,Math.round(25*tags.filter(x=>et.includes(x)).length/tags.length)); if(["VISUAL","RNAV","ILS"].includes(event.approach_type))s+=10; if(event.aircraft_category==="JET")s+=10; if(["APPROACH","LANDING"].includes(event.flight_phase))s+=10; if(et.some(x=>["UNSTABLE_APPROACH_RISK","CONVECTIVE_WEATHER","WET_RWY"].includes(x)))s+=5; return Math.min(s,100) }
    function renderBriefing(){ const q=$("flightInput").value.trim().toUpperCase()||"KE629", route=DATA.routes.routes[q]||DATA.routes.routes[`KE${parseInt(q.slice(2)||"629",10)}`]||DATA.routes.routes.KE629; const wx=DATA.weather.stations[route.arrival_icao]||{}; const tags=weatherTags(`${wx.metar} ${wx.taf}`); if(route.arrival_icao==="WADD") tags.push("WET_RWY","UNSTABLE_APPROACH_RISK"); const ctx={flight:q,route:`${route.departure_iata}-${route.arrival_iata}`,aircraft:route.aircraft_type||"Unknown",departure_icao:route.departure_icao,arrival_icao:route.arrival_icao,destination_runway:route.arrival_icao==="WADD"?"RWY09":"",risk:riskLevel(tags)}; const ranked=DATA.events.events.map(e=>[e,score(e,ctx,tags)]).filter(([e,s])=>e.airport_icao===ctx.arrival_icao||s>=35).sort((a,b)=>b[1]-a[1]).slice(0,18); const groups=[]; ranked.forEach(([e,sim])=>{const [title,desc]=threatTitle(e.tags||[]); let g=groups.find(x=>x.title===title); if(!g){g={title,desc,events:[]};groups.push(g)} if(g.events.length<4)g.events.push({...e,sim})}); $("baseWx").classList.add("hidden"); $("briefing").classList.remove("hidden"); $("briefing").innerHTML=`<article class="card"><div class="head"><div><h1>${ctx.flight} ${ctx.route}</h1><p class="muted">${ctx.departure_icao} -> ${ctx.arrival_icao} - ${ctx.aircraft}</p></div><b class="risk ${ctx.risk.toLowerCase()}">${ctx.risk}</b></div><div class="chips"><span>${ctx.destination_runway||"RWY TBD"}</span><span>${tags.join("/")||"ROUTE ONLY"}</span></div><div class="wx"><strong>METAR</strong><pre>${esc(wx.metar||"METAR unavailable")}</pre><strong>TAF</strong><pre>${esc(wx.taf||"TAF unavailable")}</pre></div></article><article class="card threats"><h2>Today's Top Threats</h2>${groups.slice(0,5).map((g,i)=>`<section class="threat"><h3><span class="rank">${i+1}</span>${esc(g.title)}</h3>${g.events.map(e=>`<details class="event"><summary><span><b>${esc(e.event_type||e.core_event||"Event")}</b><em>Events 1 - Similar ${e.sim}%</em></span><b class="risk ${severity(e.severity).toLowerCase()}">${severity(e.severity)}</b></summary><h4>${esc((e.event_date||"").slice(0,4))} ${esc(e.airport_iata||"")} ${esc(e.runway||"")} ${esc(e.aircraft_type||"")} | ${esc(e.lesson_keyword||"")}</h4><p>${esc(e.summary||g.desc)}</p><b>Contributing factors</b><ul>${(e.contributing_factors||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul><b>Operational lessons</b><ul>${(e.operational_lessons||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></details>`).join("")}</section>`).join("")}</article>` }
    $("settingsBtn").onclick=()=>{$("settings").classList.remove("hidden");$("eventCount").textContent=`${DATA.status.events} events / ${DATA.status.ops_intel_items} intel`;renderStations();$("stationInput").focus()}; $("closeSettings").onclick=()=>$("settings").classList.add("hidden"); $("settings").onclick=e=>{if(e.target===$("settings"))$("settings").classList.add("hidden")}; $("themeToggle").onchange=()=>applyTheme($("themeToggle").checked?"light":"dark"); $("stationForm").onsubmit=e=>{e.preventDefault(); const v=norm($("stationInput").value); if(v.length!==4)return; saveStations([...stations().filter(s=>s!==v),v]); $("stationInput").value=""; $("stationSave").textContent="Add"; $("settings").classList.add("hidden"); renderBaseWx()}; $("searchBtn").onclick=renderBriefing; $("flightInput").onkeydown=e=>{if(e.key==="Enter")renderBriefing()}; loadData().then(()=>{applyTheme(localStorage.getItem("opsIntelTheme")||"dark"); renderBaseWx()});
  </script>
</body>
</html>
